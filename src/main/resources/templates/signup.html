<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <div style="max-width: 300px; margin: 100px auto; font-family: sans-serif;">
        <h2>Create SafeX Account</h2>
        <form th:action="@{/signup}" method="post">
            <input type="text" name="username" placeholder="Username" required style="width:100%; margin-bottom:10px;">
            <input type="password" name="password" placeholder="Password" required style="width:100%; margin-bottom:10px;">
            <button type="submit" style="width:100%; background: #28a745; color: white; border: none; padding: 10px;">Sign Up</button>
        </form>
        <p>Have an account? <a href="/login">Login</a></p>
    </div>
</body>
</html>
